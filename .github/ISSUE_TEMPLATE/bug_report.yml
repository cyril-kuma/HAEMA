name: Bug report
description: Report a problem running the HÆMA pipeline
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: The exact `nextflow run ...` command (including the profile) you used.
      render: bash
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: >-
        The error from the console, and the relevant lines from `.command.err` /
        `.command.log` in the failing task's work directory (printed in the error message).
      render: text
    validations:
      required: true
  - type: input
    id: nextflow
    attributes:
      label: Nextflow version
      description: Output of `nextflow info` (Nextflow + Java version).
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Container engine
      options: [Docker, Singularity, Apptainer, none/host]
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / hardware
      description: e.g. Ubuntu 22.04, 16-core / 64 GB; or macOS arm64 laptop.
    validations:
      required: false
